<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitbucket Custom Services</title>
    <link rel="icon" href="/img/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/mode-json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/theme-dracula.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        },
                        dark: {
                            100: '#1f2937',
                            200: '#111827',
                            300: '#0f172a',
                        },
                        editor: {
                            dark: '#282a36',
                            light: '#f8f9fa'
                        }
                    },
                    boxShadow: {
                        'soft': '0 2px 15px 0 rgba(0, 0, 0, 0.05)',
                        'deep': '0 5px 30px 0 rgba(0, 0, 0, 0.1)',
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer components {
            .card {
                @apply bg-white shadow-soft border-0 rounded-lg;
            }
            
            .btn-primary {
                @apply px-5 py-2.5 bg-gradient-to-r from-primary-600 to-primary-500 text-white rounded-md hover:from-primary-700 hover:to-primary-600 transition-all duration-200 font-medium text-sm focus:outline-none focus:ring-2 focus:ring-primary-400 focus:ring-offset-2 shadow-sm;
            }
            
            .btn-secondary {
                @apply px-4 py-2 bg-white text-gray-700 rounded-md hover:bg-gray-50 transition-all duration-200 border border-gray-200 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-gray-300 focus:ring-offset-2 shadow-sm;
            }
            
            .btn-icon {
                @apply p-2 text-gray-500 rounded-md hover:bg-gray-100 transition-all duration-200 focus:outline-none;
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideIn {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .animate-fadeIn {
            animation: fadeIn 0.3s ease-out forwards;
        }
        
        .animate-slideIn {
            animation: slideIn 0.3s ease-out forwards;
        }
        
        /* Editor Styles */
        #editor-container {
            height: calc(100vh - 140px);
            margin-bottom: 0;
            overflow: hidden;
            position: relative;
            border-radius: 0.75rem;
            background-color: theme('colors.editor.dark');
            box-shadow: theme('boxShadow.soft');
        }

        #editor {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            font-family: 'SF Mono', Menlo, Monaco, 'Courier New', monospace;
            font-size: 15px;
            line-height: 1.5;
        }

        /* Custom scrollbar */
        #editor-container ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        #editor-container ::-webkit-scrollbar-track {
            background: transparent;
        }

        #editor-container ::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.5);
            border-radius: 5px;
            border: 2px solid transparent;
            background-clip: content-box;
        }

        #editor-container ::-webkit-scrollbar-thumb:hover {
            background: rgba(156, 163, 175, 0.7);
        }

        /* Dark mode */
        body.dark {
            @apply bg-dark-100 text-gray-100;
        }
        
        body.dark .card {
            @apply bg-dark-200 border-gray-700;
        }
        
        body.dark .btn-secondary {
            @apply bg-gray-700 text-gray-200 border-gray-600 hover:bg-gray-600;
        }
        
        body.dark .btn-icon {
            @apply text-gray-300 hover:bg-gray-700;
        }
        
        body.dark #editor-container {
            background-color: theme('colors.editor.dark');
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.1);
            border: 1px solid #64748b;
        }

        /* Add custom theme colors for dark mode */
        body.dark {
            --dark-bg: #64748b;
            --dark-card: #475569;
            background-color: var(--dark-bg);
        }
        
        body.dark .card {
            background-color: var(--dark-card);
        }

        /* Update the header in dark mode */
        body.dark header {
            background-color: #475569;
            border-color: #64748b;
        }

        body.dark h1 {
            color: #f9fafb;
        }
    </style>
</head>
<body class="h-full bg-gray-50 text-gray-800 font-sans antialiased overflow-hidden">
<div class="h-full flex flex-col">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-100 flex-none z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-14 items-center">
                <div class="flex items-center">
                    <svg class="w-8 h-8 text-primary-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <h1 class="ml-3 text-xl font-semibold text-gray-800">
                        Configuration Editor
                    </h1>
                </div>
                <div class="flex items-center space-x-3">
                    <button onclick="toggleDarkMode()" class="btn-icon flex items-center">
                        <svg id="theme-toggle-icon" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                        </svg>
                    </button>
                    <a href="/management" class="btn-secondary flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                        </svg>
                        Home
                    </a>
                    <a href="/users" class="btn-secondary flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                        </svg>
                        Users
                    </a>
                    <button onclick="location.reload()" class="btn-secondary flex items-center">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                        Refresh
                    </button>
                    <button onclick="logout()" class="btn-secondary flex items-center text-red-600 hover:bg-red-50">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Editor -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-4 flex flex-col">
        <div class="card p-0 overflow-hidden animate-fadeIn flex-1 flex flex-col mb-2">
            <!-- Editor container -->
            <div id="editor-container" class="flex-1">
                <div id="editor"></div>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex justify-end space-x-4 flex-none">
            <button onclick="saveConfig()" id="save-button"
                    class="btn-primary flex items-center disabled:opacity-50 disabled:cursor-not-allowed">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                </svg>
                <span>Save Changes</span>
                <div id="save-spinner" class="ml-2 hidden">
                    <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </div>
            </button>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 hidden animate-slideIn">
        <div class="px-5 py-4 rounded-lg shadow-deep bg-white border border-gray-100 max-w-md transform transition-transform duration-300">
            <div class="flex items-center">
                <div id="toast-icon" class="flex-shrink-0 w-6 h-6 mr-3 text-primary-500"></div>
                <span class="text-gray-800 text-sm font-medium" id="toast-message"></span>
            </div>
        </div>
    </div>
</div>

<script>
    let editor = null;
    let isDarkMode = localStorage.getItem("darkMode") === "true";

    function initializeEditor() {
        // Set up Ace Editor
        editor = ace.edit("editor", {
            theme: isDarkMode ? "ace/theme/dracula" : "ace/theme/chrome",
            mode: "ace/mode/json",
            value: `{{CONFIG}}`,
            fontSize: "15px",
            showPrintMargin: false,
            useWorker: false,
            wrap: true,
            scrollPastEnd: true,
        });

        // Set up editor options
        editor.setOptions({
            fontFamily: "'SF Mono', Menlo, Monaco, 'Courier New', monospace",
            enableBasicAutocompletion: true,
            enableLiveAutocompletion: true,
            highlightActiveLine: true,
            highlightSelectedWord: true,
            cursorStyle: "ace",
            scrollPastEnd: 0.5,
            showGutter: true,
        });

        // Ensure the editor resizes correctly
        editor.renderer.updateFull();
        editor.resize();

        // Handle window resize
        window.addEventListener("resize", () => {
            editor.resize();
            editor.renderer.updateFull();
        });
    }

    function toggleDarkMode() {
        isDarkMode = !isDarkMode;
        localStorage.setItem("darkMode", isDarkMode);
        document.body.classList.toggle("dark");
        
        // Toggle editor theme
        editor.setTheme(isDarkMode ? "ace/theme/dracula" : "ace/theme/chrome");
        
        // Update theme icon
        const themeIcon = document.getElementById("theme-toggle-icon");
        if (isDarkMode) {
            themeIcon.innerHTML = `
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            `;
            // Ensure editor has proper contrast in dark mode
            editor.renderer.setScrollMargin(0, 0, 0, 0);
            editor.renderer.updateFull();
        } else {
            themeIcon.innerHTML = `
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            `;
        }
    }

    async function saveConfig() {
        const saveButton = document.getElementById("save-button");
        const spinner = document.getElementById("save-spinner");

        // Disable button and show spinner
        saveButton.disabled = true;
        spinner.classList.remove("hidden");

        try {
            const response = await fetch("/config/save", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: editor.getValue()
            });

            if (response.ok) {
                showToast("Configuration saved successfully");
            } else {
                showToast("Failed to save configuration", true);
            }
        } catch (error) {
            showToast("Network error occurred", true);
            console.error("Save error:", error);
        } finally {
            // Enable button and hide spinner after a short delay for better UX
            setTimeout(() => {
                saveButton.disabled = false;
                spinner.classList.add("hidden");
            }, 500);
        }
    }

    function showToast(message, isError = false) {
        const toast = document.getElementById("toast");
        const toastMessage = document.getElementById("toast-message");
        const toastIcon = document.getElementById("toast-icon");

        if (isError) {
            toastIcon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>`;
        } else {
            toastIcon.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-primary-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>`;
        }

        toastMessage.textContent = message;
        toast.classList.remove("hidden");
        
        // Add a little bump animation
        toast.classList.add("scale-105");
        setTimeout(() => toast.classList.remove("scale-105"), 100);

        setTimeout(() => {
            toast.classList.add("hidden");
        }, 3000);
    }

    async function logout() {
        try {
            // Call the server-side logout endpoint
            await fetch('/api/auth/logout');
            
            // Clear local storage
            localStorage.clear();
            
            // Clear session storage
            sessionStorage.clear();
            
            console.log("Logout successful, redirecting to login page...");
            
            // Redirect to login page
            window.location.href = '/login';
        } catch (error) {
            showToast("Failed to logout", true);
            console.error("Logout error:", error);
            
            // Even if the server-side logout fails, try to redirect to login
            setTimeout(() => {
                window.location.href = '/login';
            }, 1000);
        }
    }

    // Initialize dark mode if needed
    if (isDarkMode) {
        document.body.classList.add("dark");
    }
    
    // Initialize editor when page loads
    window.onload = initializeEditor;
</script>
</body>
</html>
