<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitbucket Custom Services</title>
    <link rel="icon" href="/img/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha256/0.9.0/sha256.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            200: '#bae6fd',
                            300: '#7dd3fc',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            800: '#075985',
                            900: '#0c4a6e',
                        }
                    },
                    boxShadow: {
                        'soft': '0 2px 15px 0 rgba(0, 0, 0, 0.05)',
                        'deep': '0 5px 30px 0 rgba(0, 0, 0, 0.1)',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer components {
            .btn-primary {
                @apply px-5 py-2.5 bg-gradient-to-r from-primary-600 to-primary-500 text-white rounded-md hover:from-primary-700 hover:to-primary-600 transition-all duration-200 font-medium focus:outline-none focus:ring-2 focus:ring-primary-400 focus:ring-offset-2 shadow-sm;
            }
            
            .form-input {
                @apply w-full px-3.5 py-2.5 bg-white rounded-md border border-gray-300 text-gray-700 shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-all duration-200 text-sm;
            }
            
            .form-label {
                @apply block text-sm font-medium text-gray-700 mb-1.5;
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes shake {
            10%, 90% { transform: translateX(-1px); }
            20%, 80% { transform: translateX(2px); }
            30%, 50%, 70% { transform: translateX(-4px); }
            40%, 60% { transform: translateX(4px); }
        }
        
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
        .animate-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
    </style>
</head>
<body class="h-full bg-gradient-to-br from-gray-50 to-primary-50 text-gray-800 font-sans antialiased">
    <div class="flex items-center justify-center min-h-screen px-4">
        <div class="animate-fadeIn bg-white rounded-xl shadow-deep p-8 w-full max-w-md">
            <div class="mb-8 text-center">
                <div class="mx-auto h-14 w-14 bg-primary-100 text-primary-600 rounded-full flex items-center justify-center">
                    <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h1 class="mt-5 text-2xl font-bold text-gray-900">
                    Bitbucket Custom Services
                </h1>
                <p class="mt-2 text-sm text-gray-600">
                    Enter your credentials to access the configuration
                </p>
            </div>

            <div id="error-container" class="mb-6"></div>

            <form id="loginForm" action="/login" method="post" class="space-y-5">
                <input type="hidden" name="{{ANTI_FORGERY_FIELD}}" value="{{ANTI_FORGERY_TOKEN}}" />
                <input type="hidden" name="returnUrl" value="{{RETURN_URL}}" />

                <div>
                    <label class="form-label" for="usernameInput">
                        Username
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                            </svg>
                        </div>
                        <input
                            id="usernameInput"
                            name="username"
                            type="text"
                            required
                            class="form-input pl-10"
                            placeholder="Enter your username"
                            autocomplete="username"
                        >
                    </div>
                </div>

                <div>
                    <label class="form-label" for="passwordInput">
                        Password
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <input
                            id="passwordInput"
                            name="password"
                            type="password"
                            required
                            class="form-input pl-10"
                            placeholder="Enter your password"
                            autocomplete="current-password"
                        >
                        <button
                            type="button"
                            onclick="togglePasswordVisibility()"
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none"
                        >
                            <svg id="eye-icon" class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="pt-2">
                    <button
                        type="submit"
                        class="btn-primary w-full py-2.5 flex items-center justify-center"
                    >
                        <span>Login</span>
                        <svg class="ml-2 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <template id="error-template">
        <div class="text-red-600 bg-red-50 border border-red-100 rounded-md p-3 flex items-start space-x-3 animate-shake">
            <svg class="h-5 w-5 flex-shrink-0 mt-0.5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            <div>
                <p class="text-sm font-medium">Authentication Error</p>
                <p class="mt-1 text-xs error-message"></p>
            </div>
        </div>
    </template>

    <script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('passwordInput');
            const eyeIcon = document.getElementById('eye-icon');
            const type = passwordInput.type === 'password' ? 'text' : 'password';

            passwordInput.type = type;
            eyeIcon.innerHTML = type === 'password' ?
                `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                 <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />` :
                `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M10 14l-2-2m0 0l-2-2m2 2l2 2m7.5-10.5l2.122-2.121a1.5 1.5 0 012.121 2.122L3.879 19.879a1.5 1.5 0 01-2.121-2.122L6.5 6.5z" />`;
        }

        function showError(message) {
            const container = document.getElementById('error-container');
            const template = document.getElementById('error-template');
            const clone = template.content.cloneNode(true);

            clone.querySelector('.error-message').textContent = message;
            container.innerHTML = '';
            container.appendChild(clone);

            setTimeout(() => {
                const errorEl = container.firstChild;
                if (errorEl) {
                    errorEl.style.opacity = '0';
                    errorEl.style.transform = 'translateY(-10px)';
                    setTimeout(() => {
                        container.innerHTML = '';
                    }, 300);
                }
            }, 5000);
        }

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const username = document.getElementById('usernameInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();

            if (!username || !password) {
                showError('Both username and password are required');
                return;
            }

            this.submit();
        });

        // Check for URL error parameter on load
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('error')) {
                showError('Invalid username or password. Please try again.');
            }
        };
    </script>
</body>
</html>
